[tools]
python = "3.13"
uv = "0.6.2"

# ---------------------------
# uv environment
# ---------------------------

[tasks."uv:sync"]
description = "Create/update the project virtual env and install main+dev deps (uv sync --dev)"
run = "uv sync --dev"
depends = ["git-hooks:install"]

[tasks."uv:clean"]
description = "Remove build artifacts and caches (dist/, build/, .pytest_cache/, .mypy_cache/, __pycache__)"
run = """
rm -rf dist build .pytest_cache .mypy_cache .coverage htmlcov || true
find . -type d -name __pycache__ -prune -exec rm -rf {} +
"""

# ---------------------------
# Linting / formatting / typing
# ---------------------------

[tasks."lint:fix"]
description = "Apply Ruff autofixes and formatting across src/ and tests/"
depends = ["uv:sync"]
run = """
uv run ruff format src tests
uv run ruff check --fix src tests
"""

[tasks."lint:check"]
description = "Ruff lint + format check (no changes) across src/ and tests/"
depends = ["uv:sync"]
run = """
uv run ruff format --check src tests
uv run ruff check src tests
"""

[tasks."lint:types"]
description = "Static type checking with mypy across src/ and tests/"
depends = ["uv:sync"]
run = "uv run mypy --show-error-context --pretty src tests"

[tasks."lint:all"]
description = "CI-style verification: lint check, format check, and mypy"
depends = ["lint:check", "lint:types"]

# ---------------------------
# Tests
# ---------------------------

[tasks."tests:run"]
description = "Run the full test suite with pytest"
depends = ["uv:sync"]
run = "uv run pytest"

[tasks."tests:cov"]
description = "Run the full test suite with coverage report"
depends = ["uv:sync"]
run = "uv run pytest --cov=pytest_mellea --cov-report=term-missing"

# ---------------------------
# Release / packaging
# ---------------------------

[tasks."release:build"]
description = "Build wheel and sdist into dist/ (uv build)"
depends = ["uv:sync"]
run = "uv build"

[tasks."release:wheel"]
description = "Build wheel only"
depends = ["uv:sync"]
run = "uv build --wheel"

[tasks."release:sdist"]
description = "Build source distribution only"
depends = ["uv:sync"]
run = "uv build --sdist"

[tasks."release:publish"]
description = "Publish the built dist/ to PyPI (requires UV_PUBLISH_TOKEN)"
depends = ["release:build"]
run = "uv publish"

[tasks."release:publish-test"]
description = "Publish the built dist/ to TestPyPI for a dry run (requires UV_PUBLISH_TOKEN)"
depends = ["release:build"]
run = "uv publish --publish-url https://test.pypi.org/legacy/"

# ---------------------------
# Git hooks
# ---------------------------

[tasks."git-hooks:pre-commit"]
description = "Run style and type checks before each commit"
depends = ["lint:all"]

[tasks."git-hooks:pre-push"]
description = "Run tests before pushing"
depends = ["tests:run"]

[tasks."git-hooks:install"]
description = "Install pre-commit and pre-push git hooks"
run = """
#!/bin/bash
set -eu -o pipefail
test -d .git || exit 0
echo '#!/bin/sh' > .git/hooks/pre-commit
echo '{{ mise_bin }} run git-hooks:pre-commit' >> .git/hooks/pre-commit
chmod +x .git/hooks/pre-commit

echo '#!/bin/sh' > .git/hooks/pre-push
echo '{{ mise_bin }} run git-hooks:pre-push' >> .git/hooks/pre-push
chmod +x .git/hooks/pre-push
"""
sources = [".git/hooks/pre-commit", ".git/hooks/pre-push"]
outputs = { auto = true }
